<!DOCTYPE html>
<html>
<head>
  <title>ADC Mail Archive</title>
</head>
<body>
  <h1>ADC Mail Archive</h1>
  <div id="app"></div>

  <script>
    fetch('./feed.json')
      .then(r => r.json())
      .then(data => {
        const app = document.getElementById("app")

        data.forEach(thread => {
          const threadDiv = document.createElement("div")

          threadDiv.innerHTML = `
            <h2>${thread.thread} (${thread.count})</h2>
          `

          thread.items.forEach(item => {
            const post = document.createElement("div")

            post.innerHTML = `
              <h4>${item.title}</h4>
              <pre style="white-space: pre-wrap">${item.content}</pre>
              <hr>
            `

            threadDiv.appendChild(post)
          })

          app.appendChild(threadDiv)
        })
      })
  </script>
</body>
</html>
