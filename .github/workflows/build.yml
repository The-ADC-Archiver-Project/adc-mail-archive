name: build archive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: pip install -r requirements.txt

      - name: run fetch
        run: python scripts/fetch.py

      - name: build index
        run: python scripts/build_index.py

      - name: show output (debug)
        run: ls -R

      - name: commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add feed.json output/ index.html app.js
          git diff --cached --quiet && exit 0
          git commit -m "update archive"
          git push