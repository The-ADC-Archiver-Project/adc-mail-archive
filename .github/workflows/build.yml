name: Build ADC Archive

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 cloudscraper

      - name: Create data folder
        run: mkdir -p data

      - name: Fetch index
        run: python fetch_archive.py

      - name: Fetch posts
        run: python fetch_posts.py

      - name: Build archive
        run: python build_archive.py

      - name: Commit results
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data
          git commit -m "update archive" || exit 0
          git push