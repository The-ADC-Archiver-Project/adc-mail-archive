name: build archive

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: pip install -r requirements.txt

      - name: run fetch
        run: python scripts/fetch.py

      - name: build index
        run: python scripts/build_index.py

      - name: show files (debug)
        run: |
          ls -R
          cat feed.json || true

      - name: commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "update archive" || exit 0
          git push